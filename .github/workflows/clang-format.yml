name: Clang Format

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-format

      - name: Verify formatting
        run: ./scripts/check_clang_format.sh
