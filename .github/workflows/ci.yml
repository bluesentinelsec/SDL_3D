name: CI

on:
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SDL
        uses: libsdl-org/setup-sdl@main
        with:
          version: 3-latest
          install-linux-dependencies: true

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Test
        if: runner.os != 'Linux'
        run: ctest --preset release

      - name: Test
        if: runner.os == 'Linux'
        run: xvfb-run -a ctest --preset release

  emscripten:
    name: Emscripten
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure
        run: >
          emcmake cmake -S . -B build/emscripten
          -DCMAKE_BUILD_TYPE=Release
          -DSDL3D_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build/emscripten

      - name: Test
        # emrun hosts each .html shell in a local server and drives it
        # with headless Chrome. SDL gets a real DOM canvas + WebGL
        # context — the Emscripten equivalent of xvfb-run on Linux.
        run: |
          set -e
          for t in build/emscripten/tests/*.html; do
            echo "::group::$t"
            emrun \
              --browser=google-chrome \
              --browser_args="--headless=new --no-sandbox --disable-gpu" \
              --kill_exit \
              --timeout 60 \
              "$t"
            echo "::endgroup::"
          done

  android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            run_tests: false
          - abi: x86_64
            run_tests: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: >
          cmake -S . -B build/android
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=${{ matrix.abi }}
          -DANDROID_PLATFORM=android-21
          -DANDROID_STL=c++_static
          -DCMAKE_BUILD_TYPE=Release
          -DSDL3D_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build/android

      - name: Enable KVM
        if: matrix.run_tests
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run tests on Android emulator
        if: matrix.run_tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            set -e
            adb wait-for-device
            # SDL3 may ship as a shared library; push it alongside each test.
            SDL_SO=$(find build/android -name "libSDL3.so" | head -1 || true)
            if [ -n "$SDL_SO" ]; then
              adb push "$SDL_SO" /data/local/tmp/libSDL3.so
            fi
            LIBCXX=$(find $ANDROID_NDK_HOME/toolchains -name "libc++_shared.so" -path "*/x86_64-linux-android/*" | head -1 || true)
            if [ -n "$LIBCXX" ]; then
              adb push "$LIBCXX" /data/local/tmp/libc++_shared.so
            fi
            for t in build/android/tests/sdl3d_*_test; do
              [ -f "$t" ] || continue
              name=$(basename "$t")
              echo "::group::$name"
              adb push "$t" /data/local/tmp/$name
              adb shell chmod 755 /data/local/tmp/$name
              adb shell "cd /data/local/tmp && LD_LIBRARY_PATH=/data/local/tmp SDL_VIDEO_DRIVER=offscreen ./$name"
              echo "::endgroup::"
            done

  sanitizers:
    name: Sanitizers
    runs-on: ubuntu-latest

    env:
      CC: clang
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang ninja-build xvfb

      - name: Setup SDL
        uses: libsdl-org/setup-sdl@main
        with:
          version: 3-latest
          install-linux-dependencies: true

      - name: Configure
        run: cmake --preset sanitizers

      - name: Build
        run: cmake --build --preset sanitizers

      - name: Test
        run: xvfb-run -a ctest --preset sanitizers
